<!DOCTYPE html>
<html>
<head>

<title>Bulk Upload Questions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card p-4">

<h2>📥 Bulk Upload Questions</h2>

<form method="POST">

<select name="test_id"
class="form-control mb-3">

{% for test in tests %}

<option value="{{ test[0] }}">
{{ test[1] }}
</option>

{% endfor %}

</select>

<textarea
name="questions"
rows="15"
class="form-control"
placeholder="Question|Option1|Option2|Option3|Option4|Answer"></textarea>

<button class="btn btn-success mt-3">

Upload Questions

</button>

</form>

</div>

</div>

</body>
</html>
