<!DOCTYPE html>

<html>

<head>

<title>Leaderboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4">
🏆 Leaderboard
</h1>

<table class="table table-bordered bg-white">

<tr>

<th>Rank</th>
<th>Name</th>
<th>Best Score</th>

</tr>

{% for user in leaders %}

<tr>

<td>{{ loop.index }}</td>
<td>{{ user[0] }}</td>
<td>{{ user[1] }}</td>

</tr>

{% endfor %}

</table>

<a href="/dashboard"
class="btn btn-primary">

Back Dashboard

</a>

</div>

</body>
</html>
