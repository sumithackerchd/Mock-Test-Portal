<!DOCTYPE html>

<html>

<head>

<title>View Tests</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1>📝 All Tests</h1>

<table class="table table-bordered bg-white mt-4">

<tr>

<th>ID</th>
<th>Test Name</th>
<th>Duration</th>
<th>Action</th>

</tr>

{% for test in tests %}

<tr>

<td>{{ test[0] }}</td>
<td>{{ test[1] }}</td>
<td>{{ test[3] }} Min</td>

<td>

<a href="/delete_test/{{ test[0] }}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
