<!DOCTYPE html>

<html>

<head>

<title>Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1>📊 All Results</h1>

<table class="table table-bordered bg-white mt-4">

<tr>

<th>Student</th>
<th>Test</th>
<th>Score</th>

</tr>

{% for result in results %}

<tr>

<td>{{ result[0] }}</td>
<td>{{ result[1] }}</td>
<td>{{ result[2] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
