<!DOCTYPE html>
<html>
<head>

<title>Add Question</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-5">

<h2>❓ Add Question</h2>

<form method="POST">

<select
name="test_id"
class="form-control mt-3">

{% for test in tests %}

<option value="{{ test[0] }}">
{{ test[1] }}
</option>

{% endfor %}

</select>

<input type="text"
name="question"
class="form-control mt-3"
placeholder="Question"
required>

<input type="text"
name="option1"
class="form-control mt-3"
placeholder="Option 1"
required>

<input type="text"
name="option2"
class="form-control mt-3"
placeholder="Option 2"
required>

<input type="text"
name="option3"
class="form-control mt-3"
placeholder="Option 3"
required>

<input type="text"
name="option4"
class="form-control mt-3"
placeholder="Option 4"
required>

<input type="text"
name="answer"
class="form-control mt-3"
placeholder="Correct Answer"
required>

<button class="btn btn-success mt-3">
Save Question
</button>

</form>

</div>

</div>

</body>
</html>
