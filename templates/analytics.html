<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4">📊 Exam Analytics</h1>

<div class="row g-4">

<div class="col-md-3">
<div class="card p-4 text-center">
<h2>{{ total_students }}</h2>
<p>Total Students</p>
</div>
</div>

<div class="col-md-3">
<div class="card p-4 text-center">
<h2>{{ total_tests }}</h2>
<p>Total Tests</p>
</div>
</div>

<div class="col-md-3">
<div class="card p-4 text-center">
<h2>{{ total_questions }}</h2>
<p>Total Questions</p>
</div>
</div>

<div class="col-md-3">
<div class="card p-4 text-center">
<h2>{{ total_attempts }}</h2>
<p>Total Attempts</p>
</div>
</div>

</div>

<hr>

<div class="card p-4 mt-4">

<h4>📈 Average Score : {{ avg_score }}</h4>

<h4>🏆 Highest Score : {{ highest_score }}</h4>

<h4>📉 Lowest Score : {{ lowest_score }}</h4>

</div>

<a href="/admin_dashboard"
class="btn btn-primary mt-4">

Back Dashboard

</a>

</div>

</body>
</html>
